<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Datos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-800 mb-8 text-center">Registros Almacenados</h1>
        
        <div id="loader" class="text-center text-gray-600">
            Cargando la información...
        </div>

        <div id="results" class="space-y-6 hidden">
            <!-- Data will be injected here -->
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('/api/data');
                const result = await response.json();
                
                document.getElementById('loader').classList.add('hidden');
                const resultsDiv = document.getElementById('results');
                resultsDiv.classList.remove('hidden');

                if (!result.data || result.data.length === 0) {
                    resultsDiv.innerHTML = '<div class="text-center p-6 bg-white rounded-lg shadow text-gray-500">No hay datos disponibles aún. ¡Agrega algunos!</div>';
                    return;
                }

                let html = '';
                result.data.forEach(category => {
                    html += `<div class="bg-white overflow-hidden shadow rounded-lg mb-6">`;
                    html += `<div class="px-4 py-5 sm:px-6 bg-indigo-50 border-b border-indigo-100 flex items-center justify-between">
                                 <h2 class="text-xl leading-6 font-bold text-indigo-800">Categoría: ${category.category}</h2>
                             </div>`;
                    
                    if (category.checklists && category.checklists.length > 0) {
                        html += `<div class="p-6 space-y-6">`;
                        category.checklists.forEach(checklist => {
                            html += `<div class="bg-gray-50 p-5 rounded-lg border border-gray-200">
                                        <h3 class="text-xl font-semibold text-gray-900 border-b border-gray-300 pb-2 mb-4">Checklist: <span class="text-indigo-600">${checklist.name}</span></h3>
                                        
                                        <!-- Factors -->
                                        <div class="mb-4">
                                            <h4 class="text-md font-bold text-gray-700 mb-2">Factors</h4>
                                            <div class="flex flex-wrap gap-2">`;
                            if (checklist.factors && checklist.factors.length > 0) {
                                checklist.factors.forEach(f => {
                                    html += `<span class="bg-blue-100 text-blue-800 text-xs px-2.5 py-0.5 rounded border border-blue-400">${f.category}</span>`;
                                });
                            } else {
                                html += `<span class="text-sm text-gray-400 italic">Sin factors asignados</span>`;
                            }
                            html += `       </div>
                                        </div>

                                        <!-- Questions -->
                                        <div class="mb-4">
                                            <h4 class="text-md font-bold text-gray-700 mb-2">Questions</h4>
                                            <ul class="space-y-3">`;
                                            
                            if (checklist.questions && checklist.questions.length > 0) {
                                checklist.questions.forEach(q => {
                                    html += `<li class="bg-white p-4 rounded-md border border-gray-200 shadow-sm hover:shadow transition">
                                                <p class="font-medium text-gray-800 mb-1"><span class="font-bold text-indigo-500">Q:</span> ${q.question_text}</p>
                                                <p class="text-sm text-gray-600"><span class="font-semibold text-gray-700">Prompt:</span> ${q.prompt}</p>
                                             </li>`;
                                });
                            } else {
                                html += `<li class="text-sm text-gray-400 italic">Sin preguntas asignadas</li>`;
                            }
                            
                            html += `       </ul>
                                        </div>

                                        <!-- References -->
                                        <div>
                                            <h4 class="text-md font-bold text-gray-700 mb-2">References</h4>
                                            <ul class="list-disc list-inside space-y-1">`;
                            if (checklist.references && checklist.references.length > 0) {
                                checklist.references.forEach(r => {
                                    html += `<li class="text-sm text-indigo-600"><a href="${r.reference_url}" target="_blank" class="hover:underline flex items-center inline-flex"><svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 20 20"><path d="M11 3a1 1 0 100 2h2.586l-6.293 6.293a1 1 0 101.414 1.414L15 6.414V9a1 1 0 102 0V4a1 1 0 00-1-1h-5z"></path><path d="M5 5a2 2 0 00-2 2v8a2 2 0 002 2h8a2 2 0 002-2v-3a1 1 0 10-2 0v3H5V7h3a1 1 0 000-2H5z"></path></svg> ${r.reference_title}</a></li>`;
                                });
                            } else {
                                html += `<li class="text-sm text-gray-400 italic list-none">Sin referencias asignadas</li>`;
                            }
                            html += `       </ul>
                                        </div>
                                     </div>`;
                        });
                        html += `</div>`;
                    } else {
                        html += `<div class="p-4 text-sm text-gray-500">Esta categoría no tiene checklists.</div>`;
                    }
                    html += `</div>`;
                });

                resultsDiv.innerHTML = html;

            } catch (err) {
                document.getElementById('loader').innerText = 'Error al cargar los datos. Verifica la API.';
                document.getElementById('loader').classList.add('text-red-500', 'font-bold');
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
